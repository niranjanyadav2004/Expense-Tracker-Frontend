[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[context.production]
  environment = { VITE_API_URL = "https://expense-tracker-1-0-plwc.onrender.com/api" }

[context.deploy-preview]
  environment = { VITE_API_URL = "https://expense-tracker-1-0-plwc.onrender.com/api" }

[context.branch-deploy]
  environment = { VITE_API_URL = "https://expense-tracker-1-0-plwc.onrender.com/api" }

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
